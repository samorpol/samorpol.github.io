<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=()">

    <title>Sam Orpol - Platform Technologist</title>
    <meta name="description" content="Platform Technologist | Analytics & Data Strategy Leader. Building analytics organizations from zero.">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-inner">
            <div class="logo">
                <a href="#hero" class="logo-link">
                    <svg class="logo-octopus" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="6" r="3"/>
                        <line x1="8" y1="9" x2="8" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="10" y1="9" x2="10" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="12" y1="9" x2="12" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="14" y1="9" x2="14" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="6" y1="9" x2="6" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="16" y1="9" x2="16" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="4" y1="11" x2="4" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="18" y1="11" x2="18" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    Sam Orpol
                </a>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav id="mainNav">
                <ul>
                    <li><a href="#about">About</a></li>
                    <li><a href="#coming-soon">Coming Soon</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Canvas -->
    <canvas id="hero-canvas"></canvas>

    <!-- Hero Section -->
    <section id="hero">
        <div class="container">
            <div class="hero-content">
                <h1 id="heroHeadline"></h1>
                <p class="hero-tagline" id="heroTagline"></p>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about">
        <div class="container">
            <div class="section-content">
                <h2 id="aboutTitle"></h2>
                <p id="aboutSummary" class="large-text"></p>
                <p id="aboutDescription"></p>
                <div id="aboutLinks" class="about-links"></div>
            </div>
        </div>
    </section>

    <!-- Coming Soon Section -->
    <section id="coming-soon" class="compact">
        <div class="container">
            <div class="coming-soon-content">
                <h2>Coming Soon</h2>
                <div class="coming-soon-list">
                    <p>CV</p>
                    <p>Photography</p>
                    <p>Music</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Sam Orpol. All rights reserved.</p>
        </div>
    </footer>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
            integrity="sha512-dLxUelApnYxpLt6K2iomGngnHO83iUvZytA3YjDUCjT0HDOHKXnVYdf3hU4JjM8uEhxf9nD1/ey98U3t2vZ0qQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>

    <script src="script.js"></script>
</body>
</html>
