<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=()">

    <title>Sam Orpol - Platform Technologist</title>
    <meta name="description" content="Platform Technologist | Analytics & Data Strategy Leader. Building analytics organizations from zero.">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-inner">
            <div class="logo">
                <a href="#hero" class="logo-link">
                    <svg class="logo-octopus" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="8" r="3" fill="currentColor"/>
                        <path d="M12 11c2 0 3 1 3 2v2c0 1-1 2-3 2s-3-1-3-2v-2c0-1 1-2 3-2z" fill="currentColor" opacity="0.8"/>
                        <path d="M9 13v3m6-3v3M6 13c0 2 1 3 2 4m10-4c0 2-1 3-2 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    Sam Orpol
                </a>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav id="mainNav">
                <ul>
                    <li><a href="#about">About</a></li>
                    <li><a href="#coming-soon">Coming Soon</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Canvas -->
    <canvas id="hero-canvas"></canvas>

    <!-- Hero Section -->
    <section id="hero">
        <div class="container">
            <div class="hero-content">
                <h1 id="heroHeadline"></h1>
                <p class="hero-tagline" id="heroTagline"></p>
                <a href="#contact" class="cta-button">Get in Touch</a>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about">
        <div class="container">
            <div class="section-content">
                <h2 id="aboutTitle"></h2>
                <p id="aboutSummary" class="large-text"></p>
                <p id="aboutDescription"></p>
                <div id="aboutLinks" class="about-links"></div>
            </div>
        </div>
    </section>

    <!-- Coming Soon Section -->
    <section id="coming-soon" class="compact">
        <div class="container">
            <h2>Coming Soon</h2>
            <div class="coming-soon-grid" id="comingSoonGrid"></div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <div class="container">
            <div class="contact-content">
                <h2>Let's Connect</h2>
                <p id="contactCta"></p>
                <div class="contact-links">
                    <a id="emailLink" href="" class="contact-link">Email</a>
                    <a id="linkedinLink" href="" target="_blank" class="contact-link">LinkedIn</a>
                    <a id="githubLink" href="" target="_blank" class="contact-link">GitHub</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Sam Orpol. All rights reserved.</p>
        </div>
    </footer>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
            integrity="sha512-dLxUelApnYxpLt6K2iomGngnHO83iUvZytA3YjDUCjT0HDOHKXnVYdf3hU4JjM8uEhxf9nD1/ey98U3t2vZ0qQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>

    <script src="script.js"></script>
</body>
</html>
